openapi: 3.0.0
info:
  title: Trip.com Clone - Favourites & Booking History Service
  version: 1.0.0
  description: >
    Microservice for managing registered users' favourites and booking history.
    All endpoints require authentication via JWT.

servers:
  - url: http://localhost:8001/v1/user-activity
    description: Local development server
  - url: https://api.tripclone.com/v1/user-activity
    description: Production server

security:
  - bearerAuth: []

paths:
  /users/me/favourites:
    get:
      tags: [Favourites (Registered Only)]
      summary: Get list of favourite hotels for the user
      description: Returns all hotels the user has marked as favourite.
      responses:
        '200':
          description: List of favourite hotels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FavouriteHotelCard'
        '401': { description: Unauthorized — invalid or missing JWT }

  /users/me/favourites/{hotel_id}:
    # post:
    #   tags: [Favourites (Registered Only)]
    #   summary: Add a hotel to favourites
    #   description: Adds the specified hotel to the user's favourites list.
    #   parameters:
    #     - name: hotel_id
    #       in: path
    #       required: true
    #       schema: { type: integer }
    #   responses:
    #     '200': { description: Hotel added to favourites successfully }
    #     '401': { description: Unauthorized — invalid or missing JWT }
    #     '404': { description: Hotel not found }

    delete:
      tags: [Favourites (Registered Only)]
      summary: Remove a hotel from favourites
      description: Removes the specified hotel from the user's favourites list.
      parameters:
        - name: hotel_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Hotel removed from favourites successfully }
        '401': { description: Unauthorized — invalid or missing JWT }
        '404': { description: Hotel not found }

  /users/me/bookings:
    get:
      tags: [Booking History (Registered Only)]
      summary: Get booking history
      description: Returns the list of all bookings made by the authenticated user.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Paginated booking history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingHistoryResponse'
        '401': { description: Unauthorized — invalid or missing JWT }

components:
  schemas:
    FavouriteHotelCard:
      type: object
      properties:
        hotel_id: { type: integer }
        name: { type: string }
        thumbnail: { type: string }
        rating: { type: number }

    BookingHistoryResponse:
      type: object
      properties:
        page: { type: integer }
        size: { type: integer }
        total_pages: { type: integer }
        total_bookings: { type: integer }
        bookings:
          type: array
          items:
            $ref: '#/components/schemas/BookingSummary'

    BookingSummary:
      type: object
      properties:
        booking_id: { type: string }
        hotel:
          $ref: '#/components/schemas/FavouriteHotelCard'
        room_name: { type: string }
        checkin_date: { type: string, format: date }
        checkout_date: { type: string, format: date }
        total_price: { type: number }
        currency: { type: string }
        status:
          type: string
          enum:
            - INITIATED
            - PAYMENT_PENDING
            - CONFIRMED
            - CANCELLED
            - REFUNDED
            - EXPIRED

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT