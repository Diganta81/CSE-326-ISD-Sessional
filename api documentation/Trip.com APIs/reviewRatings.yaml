openapi: 3.0.0
info:
  title: Trip.com Clone - Reviews & Ratings Service
  version: 1.0.0
  description: >
    Managing hotel reviews and ratings.
    Registered users can submit reviews 48h after checkout.
    JWT authentication is required for registered-user operations.

servers:
  - url: http://localhost:8002/v1/reviews-ratings
    description: Local development server
  - url: https://api.tripclone.com/v1/reviews-ratings
    description: Production server

security:
  - bearerAuth: []

paths:
  /users/me/reviews:
    get:
      tags: [Reviews (Registered User Only)]
      summary: Get all reviews submitted by the user
      description: Returns a paginated list of reviews submitted by the authenticated user.
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Paginated list of user's reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserReviewList'
        '401': { description: Unauthorized — invalid or missing JWT }
    post:
      tags: [Reviews (Registered User Only)]
      summary: Submit a review
      description: >
        Users can submit reviews only if at least 48h have passed since checkout.
        Booking ID is required for verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
      responses:
        '201': { description: Review submitted successfully }
        '400': { description: Invalid input / review already submitted for this booking }
        '401': { description: Unauthorized — invalid or missing JWT }
        '404': { description: Booking or Hotel not found }

  /users/me/reviews/{review_id}:
    put:
      tags: [Reviews (Registered User Only)]
      summary: Edit a submitted review
      description: Users can edit their own reviews.
      parameters:
        - name: review_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewUpdate'
      responses:
        '200':
          description: Review updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewSummary'
        '400': { description: Invalid input }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — not the owner of the review }
        '404': { description: Review not found }
  /admin/reviews:
    get:
      tags: [Admin - Reviews]
      summary: Get all reviews (Admin)
      security:
        - bearerAuth: []
      responses:
        '200': { description: List of all reviews for moderation }
        '403': { description: Forbidden — non-admin }

  /admin/reviews/{review_id}:
    delete:
      tags: [Admin - Reviews]
      summary: Delete / moderate a review
      security:
        - bearerAuth: []
      parameters:
        - name: review_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Review deleted successfully }
        '403': { description: Forbidden — non-admin }
        '404': { description: Review not found }

components:
  schemas:
    ReviewCreate:
      type: object
      required: [booking_id, hotel_id, rating, comment]
      properties:
        booking_id: { type: string }
        hotel_id: { type: integer }
        rating:
          type: number
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 1000

    ReviewUpdate:
      type: object
      properties:
        rating:
          type: number
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 1000

    UserReviewList:
      type: object
      properties:
        page: { type: integer }
        size: { type: integer }
        total_pages: { type: integer }
        total_reviews: { type: integer }
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/ReviewSummary'

    ReviewSummary:
      type: object
      properties:
        review_id: { type: string }
        user_name: { type: string }
        rating: { type: number }
        comment: { type: string }
        created_at:
          type: string
          format: date-time
        updated_at:                 
          type: string
          format: date-time
          nullable: true
          description: Null if the review has never been edited after submission.
        edit_count:                  
          type: integer
          default: 0
          description: >
            Number of times this review has been edited. Visible to admins
            for abuse monitoring. High edit_count may indicate review manipulation.
        hotel_id: { type: integer }
        booking_id: { type: string }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT