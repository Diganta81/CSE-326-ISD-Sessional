  #       '200':
  #         description: Hotel added to favourites

  #   delete:
  #     tags: [Favourites (Registered Only)]
  #     summary: Remove Hotel from Favourites
  #     security:
  #       - bearerAuth: []
  #     responses:
  #       '200':
  #         description: Hotel removed from favourites
  /admin/hotels:
    get:
      summary: Admin - List All Hotels
      tags: [Admin - Hotels]
      description: Admin can view all hotels in the system.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Paginated list of hotels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminHotelListResponse'
        '403': { description: Forbidden — non-admin }

  /admin/hotels/{hotel_id}:
    put:
      summary: Admin - Update Hotel
      tags: [Admin - Hotels]
      security:
        - bearerAuth: []
      parameters:
        - name: hotel_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminHotelUpdate'
      responses:
        '200': { description: Hotel updated successfully }
        '400': { description: Invalid input }
        '403': { description: Forbidden — non-admin }
        '404': { description: Hotel not found }

    delete:
      summary: Admin - Delete Hotel
      tags: [Admin - Hotels]
      security:
        - bearerAuth: []
      responses:
        '200': { description: Hotel deleted successfully }
        '403': { description: Forbidden — non-admin }
        '404': { description: Hotel not found }

